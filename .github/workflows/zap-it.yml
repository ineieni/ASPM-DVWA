on:
  push:
    branches: [ "master" ]

jobs:
  build-dvwa:
    runs-on: ubuntu-latest
    name: Building the dvwa app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker
        run: |
          docker compose up -d
          sleep 30
          curl http://localhost:4280

