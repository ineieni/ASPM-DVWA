on:
  push:
    branches: [ "master" ]


jobs:
  zap-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app_code:
              - 'src/**'      
              - 'Dockerfile'  
              - 'package.json'

      - name: Set up Docker Buildx
        if: steps.filter.outputs.app_code == 'true'
        uses: docker/setup-buildx-action@v3
       # might should change this
      - name: Build and Load Image
        if: steps.filter.outputs.app_code == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true # add to local docker cache
          tags: ghcr.io/digininja/dvwa:latest
          cache-from: type=gha 
          cache-to: type=gha,mode=max

      - name: Start DVWA
        run: docker compose up -d --no-build

      - name: ZAP Authenticated Scan
        uses: zaproxy/action-af@d186d5d9536d0f1380e5eaa58168432fefc8ed6d
        with:
          plan: 'zap-plan.yml'
      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-authenticated-report
          path: |
            zap_report.html
            zap_report.md

      - name: Create GitHub Issue From ZAP Report
        if: always() 
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f "zap_report.md" ]; 
          then
            gh issue create \
              --title "DAST Security Vulnerabilities Found" \
              --body-file zap_report.md \
              --label "security"
              
          else
            echo "No zap_report.md file found. Skipping issue creation."
          fi
          
      - name: Stop App
        if: always()
        run: docker compose down
