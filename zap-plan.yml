env:
  contexts:
    - name: "DVWA-Context"
      urls:
        - "http://localhost:4280"
      includePaths:
        - "http://localhost:4280.*"
      authentication:
        method: "browser"
        parameters:
          loginPageUrl: "http://localhost:4280/login.php"
          loginPageWait: 5
      users:
          - name: "admin"
            credentials:
              username: "admin"
              password: "password"
      sessionManagement:
        method: "cookie"
        parameters:
          tokens:
            - name: "security"
              value: "medium"
jobs:
  - type: spider
    parameters:
      context: "DVWA-Context"
      user: "admin"
  - type: passiveScan-wait
  - type: activeScan
    parameters:
      context: "DVWA-Context"
      user: "admin"
  - type: report
    parameters:
      template: "modern"
      reportDir: "/zap/wrk/"
      reportTitle: "DVWA Authenticated Scan Report"
      reportFileName: "zap_report"